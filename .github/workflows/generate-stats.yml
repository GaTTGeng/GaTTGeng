name: Generate Stats SVGs

on:
  schedule:
    # Run every 6 hours to keep stats fresh
    - cron: '23 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate-stats.yml'

permissions:
  contents: write

concurrency:
  group: generate-stats-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=transparent&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVGs
        run: |
          if git diff --quiet -- profile/stats.svg; then
            echo "No stats changes to commit."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile/stats.svg
          git commit -m 'chore: update stats SVG [skip ci]'
          git pull --rebase origin main
          git push
